name: Deploy to Showcase Portal on Push

on:
  push:
    branches:
      - showcase

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: "showcase.cedemoportal.com"
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_MOCK_AUTH: "false"
          VITE_RESTRICT_TO_GOOGLE: "false"
          VITE_ALLOWED_DOMAINS: "gmail.com"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GILBERTOS_PROJECT_340619 }}

      - name: Deploy Backend to Cloud Run (Showcase)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ca-analytics-portal-showcase
          region: us-central1
          source: ./
          flags: '--allow-unauthenticated --port 8000 --set-env-vars RESTRICT_TO_GOOGLE=false,ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }},ALLOWED_DOMAINS=${{ secrets.ALLOWED_DOMAINS }}'

      - name: Deploy to Firebase Hosting (Showcase)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GILBERTOS_PROJECT_340619 }}
          projectId: gilbertos-project-340619
          # Deploy specifically to the showcase hosting site
          target: showcase
          channelId: live
